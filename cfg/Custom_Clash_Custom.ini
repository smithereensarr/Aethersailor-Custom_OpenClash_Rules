;Custom_OpenClash_Rules
;由社区维护的分流规则与防泄漏配置模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/heunghingwan/Aethersailor-Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<建议>搭配本项目配套设置，实现最佳化的 OpenClash 使用效果！
;设置方案：https://github.com/heunghingwan/Aethersailor-Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88

;自用版（Custom）
;以 Lite 版为基底，保留少量常用分组，并将 Claude / Anthropic / AI 相关规则最前置。
;为避免 subconverter-extended 的 ruleset 数量限制，AI 细规则收敛到 rule/Custom_AI_Classical.yaml 中引用。

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;硬禁用所有 IPv6 流量，避免代理节点或系统侧 IPv6 出口影响 Claude / DNS 检测
ruleset=REJECT,[]IP-CIDR6,::/0,no-resolve
;AI / Claude 高优先级规则，必须放在所有 GEOSITE / GEOIP / 远程规则集之前
ruleset=🤖 AI服务,clash-classic:https://raw.githubusercontent.com/smithereensarr/Aethersailor-Custom_OpenClash_Rules/refs/heads/main/rule/Custom_AI_Classical.yaml,28800
;强制屏蔽常见 Cloudflare DNS / DoH / DoT 入口，避免浏览器或系统安全 DNS 绕过模板后落到香港 Anycast
ruleset=REJECT,[]DOMAIN-SUFFIX,cloudflare-dns.com
ruleset=REJECT,[]DOMAIN,one.one.one.one
ruleset=REJECT,[]DOMAIN,mozilla.cloudflare-dns.com
ruleset=REJECT,[]IP-CIDR,1.1.1.1/32,no-resolve
ruleset=REJECT,[]IP-CIDR,1.0.0.1/32,no-resolve
ruleset=REJECT,[]IP-CIDR,1.1.1.2/31,no-resolve
ruleset=REJECT,[]IP-CIDR,1.0.0.2/31,no-resolve
ruleset=REJECT,[]IP-CIDR6,2606:4700:4700::1111/128,no-resolve
ruleset=REJECT,[]IP-CIDR6,2606:4700:4700::1001/128,no-resolve
ruleset=REJECT,[]IP-CIDR6,2606:4700:4700::1112/128,no-resolve
ruleset=REJECT,[]IP-CIDR6,2606:4700:4700::1002/128,no-resolve
ruleset=REJECT,[]IP-CIDR6,2606:4700:4700::1113/128,no-resolve
ruleset=REJECT,[]IP-CIDR6,2606:4700:4700::1003/128,no-resolve
;特殊分流（丢给本模板必然存在的默认手动选择组）
ruleset=🚀 手动选择,[]DOMAIN-SUFFIX,linux.do

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;本项目收录的直连规则
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
;本项目收录的代理规则
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,2880
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
