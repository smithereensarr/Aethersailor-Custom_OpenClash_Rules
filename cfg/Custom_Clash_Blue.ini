;Custom_OpenClash_Rules
;全分组防 DNS 泄漏订阅转换模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/heunghingwan/Aethersailor-Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<建议>搭配本项目配套设置，实现最佳化的 OpenClash 使用效果！
;设置方案：https://github.com/heunghingwan/Aethersailor-Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88

;精简版（Blue）
;在 Custom 版基础上大幅精简，仅保留以下策略组（沿用现有名字）：
;🚀 手动选择 / ♻️ 自动选择 / 🤖 ChatGPT / 🤖 AI服务（Claude）/ 🇬 谷歌服务（整合 YouTube、FCM 等）/ 🐟 漏网之鱼（合并非标端口）/ 🎯 全球直连
;Claude / Anthropic 自定义规则最前置，固定走 🤖 AI服务；其余未匹配流量统一落入 🐟 漏网之鱼

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;==== 自定义最前置规则开始 ====
;核心域名
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,anthropic.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claude.ai
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claude.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,clau.de
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claudemcpclient.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claudemcpcontent.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claudeusercontent.com
;CDN 和静态资源
ruleset=🤖 AI服务,[]DOMAIN,servd-anthropic-website.b-cdn.net
ruleset=🤖 AI服务,[]DOMAIN,anthropic.com.cdn.cloudflare.net
;认证 / 内容
ruleset=🤖 AI服务,[]DOMAIN,anthropic.auth0.com
ruleset=🤖 AI服务,[]DOMAIN,anthropic-com.ghost.io
;监控和遥测
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,sentry.io
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,statsigapi.net
ruleset=🤖 AI服务,[]DOMAIN,browser-intake-us5-datadoghq.com
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,datadog
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,sift
;客服 / 第三方 widget
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,intercom.io
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,intercomcdn.com
ruleset=🤖 AI服务,[]DOMAIN,cdn.usefathom.com
;IP 段 / ASN 兜底（含中国出口修复 IP 段）
ruleset=🤖 AI服务,[]IP-CIDR,160.79.104.0/21,no-resolve
ruleset=🤖 AI服务,[]IP-CIDR6,2607:6bc0::/32,no-resolve
ruleset=🤖 AI服务,[]IP-ASN,399358,no-resolve
;本地回环、Docker 以及特殊分流
ruleset=🎯 全球直连,[]IP-CIDR,127.0.0.1/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,labooclub.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,wirachat.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,hifunclub.com
;==== 自定义最前置规则结束 ====

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;本项目收录的直连规则
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
;本项目收录的代理规则
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/heunghingwan/Aethersailor-Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;ChatGPT 相关域名
ruleset=🤖 ChatGPT,[]GEOSITE,openai
;其余 AI 服务（含 Claude）相关域名
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
;谷歌服务（整合 YouTube、谷歌FCM、Google 等）
ruleset=🇬 谷歌服务,[]GEOSITE,youtube
ruleset=🇬 谷歌服务,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;其余所有未匹配流量统一落入漏网之鱼（已合并原非标端口分组）
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

